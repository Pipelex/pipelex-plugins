# Default template variables shared by all build targets.
# Per-target .toml files can override any variable defined here.
#
# This set is deliberately small: the CLI-free plugin carries none of the
# install/upgrade/env-check switches (`min_mthds_version`, `env_check`,
# `can_run_methods`, `session_start_hook`, `*_install_cmd`/`*_upgrade_cmd`)
# that the `mthds-plugins` predecessor had. Reintroduce a variable only when a
# skill or hook actually branches on it.

[vars]
marketplace_name = "pipelex-plugins"
platform = "claude"
harness_name = "Claude Code"

# Baked default URL of the plugin-declared `pipelex-mcp` server (streamable
# HTTP). Currently the Alpic dev tunnel, so marketplace installs (e.g. the
# Claude desktop app, where no env var can be set) reach a live server —
# switch to the stable URL when pipelex-mcp deploys. Baked as a LITERAL URL
# on every platform (the Claude desktop app does no ${VAR:-default} expansion
# in plugin MCP config); for a different server, edit this value and rebuild.
mcp_server_url = "https://chubby-regions-invent-639.alpic.dev/mcp"
